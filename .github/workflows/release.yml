name: Release

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to stamp into the app bundle"
        required: false
        default: "0.1.0"

jobs:
  package:
    name: Package macOS app
    runs-on: macos-15
    permissions:
      contents: write
    env:
      HAS_MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_P12 != '' }}
      HAS_NOTARY_CREDENTIALS: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' && secrets.MACOS_CERTIFICATE_P12 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Show toolchain
        run: |
          xcode-select -p
          swift --version

      - name: Import Developer ID certificate
        if: env.HAS_MACOS_CERTIFICATE == 'true'
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/certificate.p12" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN"

      - name: Package app
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
          BUILD_NUMBER: ${{ github.run_number }}
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY || '-' }}
        run: ./scripts/package-macos.sh

      - name: Notarize app
        if: env.HAS_NOTARY_CREDENTIALS == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit dist/MacMonitor.app.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple dist/MacMonitor.app
          ditto -c -k --keepParent dist/MacMonitor.app dist/MacMonitor.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacMonitor.app
          path: dist/MacMonitor.app.zip

      - name: Prepare release notes
        id: release_meta
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            RELEASE_TITLE="Mac Monitor ${GITHUB_REF_NAME}"
            PRERELEASE_FLAG=""
          else
            RELEASE_TAG="build-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
            RELEASE_TITLE="Mac Monitor build ${GITHUB_RUN_NUMBER} (${SHORT_SHA})"
            PRERELEASE_FLAG="--prerelease"
          fi

          {
            echo "## Latest commit"
            echo
            git log -1 --pretty=format:'- `%h` %s%n- Author: %an <%ae>%n- Date: %ad' --date=short
            echo
            echo
            echo "## Changes in this build"
            echo
            git log -1 --stat --oneline
            echo
            echo
            echo "## Install"
            echo
            echo "Download \`MacMonitor.app.zip\`, unzip it, and move \`MacMonitor.app\` to \`/Applications\`."
          } > release-notes.md

          cat release-notes.md >> "$GITHUB_STEP_SUMMARY"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "title=$RELEASE_TITLE" >> "$GITHUB_OUTPUT"
          echo "prerelease_flag=$PRERELEASE_FLAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release_meta.outputs.tag }}" \
            dist/MacMonitor.app.zip \
            --target "$GITHUB_SHA" \
            --title "${{ steps.release_meta.outputs.title }}" \
            --notes-file release-notes.md \
            ${{ steps.release_meta.outputs.prerelease_flag }}
